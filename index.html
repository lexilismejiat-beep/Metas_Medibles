<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mastery Tracker - Elite OS v14</title>

<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">

<style>
:root{
    --bg:#050506;
    --card:#111116;
    --primary:#7aa2f7;
    --success:#73daca;
    --danger:#f7768e;
    --text:#c0caf5;
    --accent:#bb9af7;
    --border:#292e42;
}

*{ box-sizing:border-box; }

body{
    font-family:'Inter',system-ui,sans-serif;
    background:var(--bg);
    color:var(--text);
    margin:0;
    padding:20px;
    display:flex;
    justify-content:center;
}

.container{
    width:100%;
    max-width:1200px;
    display:grid;
    grid-template-columns:1fr 340px;
    gap:20px;
}

.card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:24px;
    padding:24px;
    box-shadow:0 10px 40px rgba(0,0,0,.5);
}

h2{
    font-size:.75rem;
    text-transform:uppercase;
    letter-spacing:2px;
    color:#565f89;
    margin-bottom:20px;
}

.header-row{
    display:grid;
    grid-template-columns:1fr 140px 100px 100px;
    gap:15px;
    padding-bottom:12px;
    border-bottom:2px solid var(--border);
    color:#565f89;
    font-size:.65rem;
    font-weight:bold;
    text-transform:uppercase;
}

.habit-row{
    display:grid;
    grid-template-columns:1fr 140px 100px 100px;
    align-items:center;
    padding:18px 0;
    border-bottom:1px solid var(--border);
    gap:15px;
}

.task-info{ display:flex; align-items:center; gap:10px; }

.delete-btn{
    color:var(--danger);
    cursor:pointer;
    font-size:1.2rem;
    background:none;
    border:none;
    opacity:.2;
    transition:.2s;
}

.habit-row:hover .delete-btn{ opacity:1; }

.name{ font-size:.95rem; font-weight:700; display:block; margin-bottom:6px; }

.goal-tag{
    font-size:.65rem;
    color:var(--accent);
    background:rgba(187,154,247,.1);
    padding:3px 8px;
    border-radius:6px;
    border:1px solid rgba(187,154,247,.2);
}

.log-control{ display:flex; align-items:center; gap:8px; justify-content:center; }

.min-input{
    background:#1a1b26;
    border:1px solid #414868;
    color:var(--success);
    width:60px;
    padding:10px;
    border-radius:10px;
    text-align:center;
    font-weight:bold;
    outline:none;
    font-size:.9rem;
}

.btn-check{
    background:#1a1b26;
    color:var(--primary);
    border:1px solid var(--primary);
    width:38px;
    height:38px;
    border-radius:12px;
    cursor:pointer;
    font-weight:bold;
    font-size:1rem;
    transition:.3s;
}

.btn-check.done{
    background:var(--success);
    color:#050506;
    border-color:var(--success);
    box-shadow:0 0 20px rgba(115,218,202,.5);
}

.progress-container{
    width:100%;
    height:6px;
    background:#24283b;
    border-radius:10px;
    overflow:hidden;
    margin-top:10px;
}

.progress-bar{
    height:100%;
    background:linear-gradient(90deg,var(--accent),var(--primary));
    transition:.8s ease;
}

.big-num{ font-size:3rem; font-weight:900; color:var(--primary); line-height:1; }

/* CALENDARIOS */
.calendar-grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:6px; }

.day-box{
    aspect-ratio:1;
    background:#1a1b26;
    border:1px solid var(--border);
    border-radius:8px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:.7rem;
    color:#565f89;
    position: relative;
}

/* Estilo Consistencia */
.day-box.active{ background:var(--accent); color:white; box-shadow: 0 0 10px rgba(187,154,247,0.3); border-color: var(--accent); }

/* Estilo Tachado (Countdown) */
.day-box.past::after {
    content: "✕";
    color: var(--danger);
    position: absolute;
    font-size: 1.1rem;
    font-weight: 900;
}
.day-box.target { border: 2px solid var(--accent); color: var(--accent); font-weight: bold; }

.add-task-area{
    display:flex;
    gap:10px;
    margin-top:25px;
    padding-top:20px;
    border-top:1px dashed var(--border);
}

input[type="text"], input[type="date"], input[type="number"]{
    background:#1a1b26;
    border:1px solid #414868;
    color:white;
    padding:12px;
    border-radius:12px;
    outline:none;
}

button{
    background:var(--accent);
    border:none;
    color:white;
    padding:12px 15px;
    border-radius:12px;
    cursor:pointer;
    font-weight:bold;
}

.level-circle{
    width:100px;
    height:100px;
    border-radius:50%;
    margin:auto;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:1.8rem;
    font-weight:900;
    background:linear-gradient(145deg,var(--accent),var(--primary));
    color:white;
    box-shadow:0 0 30px rgba(122,162,247,.4);
}

@media(max-width:950px){ .container{ grid-template-columns:1fr; } }
</style>
</head>
<body>

<div class="container">
    <div class="left-panel">
        <div class="card" style="margin-bottom:20px;">
            <h2>Meta Maestra</h2>
            <div style="display:flex;gap:10px;">
                <input type="text" id="goalTitle" placeholder="Ej: 3.000 USD MENSUALES" style="flex:2;">
                <input type="date" id="goalDate" style="flex:1;">
                <button onclick="saveMeta()">FIJAR</button>
            </div>
            <p id="metaCountdown" style="font-size:1.1rem;font-weight:700;color:var(--accent);margin-top:15px;"></p>
        </div>

        <div class="card">
            <h2>Panel de Control Diario</h2>
            <div class="header-row">
                <span>Tarea</span>
                <span style="text-align:center;">Hoy</span>
                <span style="text-align:right;">Mes</span>
                <span style="text-align:right;">Vitalicio</span>
            </div>
            <div id="habitsContainer"></div>
            <div class="add-task-area">
                <input type="text" id="newTaskInput" placeholder="Nueva tarea..." style="flex:2;">
                <input type="number" id="newTaskMins" placeholder="Min" style="width:80px;">
                <button onclick="addTask()" style="background:var(--success);color:#000;">+</button>
            </div>
        </div>
    </div>

    <div class="right-panel">
        <div class="card" style="margin-bottom:20px;">
            <h2>Tiempo Total (Mes)</h2>
            <div id="totalTime" class="big-num">0h 0m</div>
        </div>

        <div class="card" style="margin-bottom:20px;">
            <h2>Nivel Mastery</h2>
            <div style="text-align:center;">
                <div class="level-circle" id="levelCircle">1</div>
                <p id="levelText" style="margin-top:15px;font-weight:700;color:var(--success);">0h acumuladas</p>
            </div>
        </div>

        <div class="card" style="margin-bottom:20px;">
            <h2>Consistencia (Últimos 28 días)</h2>
            <div class="calendar-grid" id="consistenciaGrid"></div>
        </div>

        <div class="card">
            <h2>Cuenta Regresiva Meta</h2>
            <div class="calendar-grid" id="countdownGrid"></div>
            <p style="font-size:0.65rem; color:#565f89; margin-top:10px; text-align:center;">Días tachados = Tiempo superado</p>
        </div>
    </div>
</div>

<script>
const officialHabits = [
    { name: "Ejercicio matutino", target: 30 },
    { name: "Escribir mis metas", target: 5 },
    { name: "Agradecimiento", target: 10 },
    { name: "Leer", target: 45 },
    { name: "Editar video", target: 60 },
    { name: "Roleplay ventas", target: 20 },
    { name: "Practicar Inglés", target: 30 },
    { name: "Ejercicio noche", target: 20 }
];

const getTodayKey = () => new Date().toISOString().split('T')[0];

let db = JSON.parse(localStorage.getItem('tracker_v14')) || {
    meta:{ title:"Mi Meta", date:"" },
    habitList: officialHabits,
    logs:{}
};

function saveMeta(){
    db.meta.title = document.getElementById('goalTitle').value;
    db.meta.date = document.getElementById('goalDate').value;
    sync();
}

function addTask(){
    const name = document.getElementById('newTaskInput').value.trim();
    const mins = parseInt(document.getElementById('newTaskMins').value) || 0;
    if(name){
        db.habitList.push({ name, target: mins });
        document.getElementById('newTaskInput').value = '';
        document.getElementById('newTaskMins').value = '';
        sync();
    }
}

function removeTask(name){
    if(confirm(`¿Eliminar "${name}"?`)){
        db.habitList = db.habitList.filter(h => h.name !== name);
        sync();
    }
}

function completeHabit(name, targetMins){
    const today = getTodayKey();
    if(!db.logs[today]) db.logs[today] = {};
    const input = document.getElementById(`input-${safeId(name)}`);
    const mins = parseInt(input.value) || 0;
    if(mins <= 0) return;
    db.logs[today][name] = (db.logs[today][name] || 0) + mins;
    input.value = '';
    sync();
}

function safeId(text){ return text.replace(/\s+/g,'-'); }

function sync(){
    localStorage.setItem('tracker_v14', JSON.stringify(db));
    renderStats();
}

function formatTime(totalMins){
    const h = Math.floor(totalMins / 60);
    const m = totalMins % 60;
    return `${h}h ${m}m`;
}

function renderHabits(){
    const container = document.getElementById('habitsContainer');
    const today = getTodayKey();
    const todayData = db.logs[today] || {};
    const currentMonth = new Date().getMonth();
    const currentYear = new Date().getFullYear();

    container.innerHTML = '';

    db.habitList.forEach(habit => {
        let totalMonth = 0, totalLife = 0, activeDays = 0;

        Object.keys(db.logs).forEach(dateStr => {
            const logDate = new Date(dateStr + "T00:00:00");
            const mins = db.logs[dateStr][habit.name] || 0;
            totalLife += mins;
            if(logDate.getMonth() === currentMonth && logDate.getFullYear() === currentYear){
                totalMonth += mins;
                if(mins > 0) activeDays++;
            }
        });

        const dayOfMonth = new Date().getDate();
        const perc = Math.round((activeDays / dayOfMonth) * 100) || 0;
        const currentVal = todayData[habit.name] || 0;
        const isDone = currentVal >= habit.target;

        container.innerHTML += `
        <div class="habit-row">
            <div class="task-info">
                <button class="delete-btn" onclick="removeTask('${habit.name}')">×</button>
                <div style="flex:1">
                    <span class="name">${habit.name}</span>
                    <span class="goal-tag">${habit.target} MIN</span>
                    <div class="progress-container"><div class="progress-bar" style="width:${perc}%"></div></div>
                </div>
            </div>
            <div class="log-control">
                <input type="number" class="min-input" id="input-${safeId(habit.name)}" placeholder="0">
                <button class="btn-check ${isDone ? 'done' : ''}" onclick="completeHabit('${habit.name}', ${habit.target})">✓</button>
            </div>
            <div style="text-align:right;font-size:.8rem;">
                <span style="color:var(--success);font-weight:bold;">${perc}%</span><br>
                <small style="color:#565f89;">${formatTime(totalMonth)}</small>
            </div>
            <div style="text-align:right;font-size:.8rem;border-left:1px solid var(--border);padding-left:10px;">
                <span style="color:var(--primary);font-weight:bold;">${formatTime(totalLife)}</span><br>
                <small style="color:#565f89;">TOTAL</small>
            </div>
        </div>`;
    });
}

function renderStats(){
    const today = new Date();
    const currentMonth = today.getMonth();
    const currentYear = today.getFullYear();
    let totalMonthAll = 0, totalLifeAll = 0;

    Object.keys(db.logs).forEach(dateStr => {
        const logDate = new Date(dateStr + "T00:00:00");
        Object.values(db.logs[dateStr]).forEach(m => {
            totalLifeAll += m;
            if(logDate.getMonth() === currentMonth && logDate.getFullYear() === currentYear) totalMonthAll += m;
        });
    });

    document.getElementById('totalTime').innerText = formatTime(totalMonthAll);
    const hours = Math.floor(totalLifeAll / 60);
    document.getElementById('levelCircle').innerText = Math.floor(hours / 10) + 1;
    document.getElementById('levelText').innerText = `${hours} horas acumuladas`;

    // RENDER CALENDARIO CONSISTENCIA
    const consistenciaGrid = document.getElementById('consistenciaGrid');
    consistenciaGrid.innerHTML = '';
    let cStart = new Date(); cStart.setDate(today.getDate() - 27);
    for(let i=0; i<28; i++){
        let cur = new Date(cStart); cur.setDate(cStart.getDate() + i);
        let key = cur.toISOString().split('T')[0];
        let hasAct = db.logs[key] && Object.values(db.logs[key]).some(v => v > 0);
        consistenciaGrid.innerHTML += `<div class="day-box ${hasAct ? 'active' : ''}">${cur.getDate()}</div>`;
    }

    // RENDER CALENDARIO COUNTDOWN (TACHADO)
    if(db.meta.date){
        const target = new Date(db.meta.date + "T00:00:00");
        const diff = Math.ceil((target - today) / (1000 * 60 * 60 * 24));
        document.getElementById('metaCountdown').innerText = `${db.meta.title} • Faltan ${diff} días`;

        const countdownGrid = document.getElementById('countdownGrid');
        countdownGrid.innerHTML = '';
        let countStart = new Date(); countStart.setDate(today.getDate() - 13);
        for(let i=0; i<28; i++){
            let cur = new Date(countStart); cur.setDate(countStart.getDate() + i);
            let isPast = cur < new Date().setHours(0,0,0,0);
            let isTarget = cur.toDateString() === target.toDateString();
            countdownGrid.innerHTML += `<div class="day-box ${isPast ? 'past' : ''} ${isTarget ? 'target' : ''}">${cur.getDate()}</div>`;
        }
    }

    renderHabits();
}

document.getElementById('goalTitle').value = db.meta.title;
document.getElementById('goalDate').value = db.meta.date;
renderStats();
</script>
</body>
</html>
